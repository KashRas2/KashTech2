- type: entity
  parent: LPPBaseBlueprintProtolathe
  id: LPPBlueprintBluespaceMiner
  name: bluespace miner circuitboard blueprint
  description: A blueprint with a schematic of a bluespace miner circuitboard. It can be inserted into an protolathe.
  components:
  - type: Blueprint
    providedRecipes:
    - LPPBluespaceMinerMachineCircuitboard

- type: entity
  parent: LPPBaseBlueprintSpaceForge
  id: LPPBlueprintClothingOuterHardsuitMaxim
  name: salvager maxim hardsuit blueprint
  description: A blueprint with a schematic of a salvager maxim hardsuit. It can be inserted into an space forge.
  components:
  - type: Blueprint
    providedRecipes:
    - LPPClothingOuterHardsuitMaxim
