- type: entity
  id: BasePKAUpgrade
  parent: [BaseItem, BaseSecurityCargoContraband] # Lavaland Change
  name: PKA modkit
  description: A modkit for a proto-kinetic accelerator.
  abstract: true
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Weapons/upgrade.rsi # Lavaland Change
  - type: Item
    size: Small
  - type: GunUpgrade
  - type: StaticPrice
    price: 750
  - type: Tag
    tags:
    - PKAUpgrade

- type: entity
  id: PKAUpgradeDamage
  parent: BasePKAUpgrade
  name: PKA modkit (damage)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#ec9b2d"
    - state: overlay-2
      color: "#a71010"
    - state: overlay-3
      color: "#eb4c13"
  - type: GunUpgrade
    name: gun-upgrade-damage-name # Lavaland Change
  - type: GunUpgradeDamage
    # Lavaland Change Start
    modifier: 1.25
    #damage:
    #  types:
    #    Blunt: 15
    #    Structural: 15
    # Lavaland Change End

- type: entity
  id: PKAUpgradeRange
  parent: BasePKAUpgrade
  name: PKA modkit (range)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#2decec"
    - state: overlay-2
      color: "#1012a7"
    - state: overlay-3
      color: "#1373eb"
  - type: GunUpgrade
    name: gun-upgrade-range-name # Lavaland Change
  - type: GunUpgradeSpeed
    coefficient: 1.5

- type: entity
  id: PKAUpgradeFireRate
  parent: BasePKAUpgrade
  name: PKA modkit (fire rate)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#bbf134"
    - state: overlay-2
      color: "#07901b"
    - state: overlay-3
      color: "#9bf134"
  - type: GunUpgrade
    name: gun-upgrade-reload-name # Lavaland Change
  - type: GunUpgradeFireRate
    coefficient: 1.5
