- type: entity
  parent: [ClothingUniformBase, ClothingUniformFoldableBase]
  id: ClothingUniformJumpsuitUEGFatigueGreen
  name: UEG green BDUs
  description: A common uniform worn by "grunts" in the UEG Armed Forces. Although Earth is no longer the green paradise of old, olive BDUs remain an emblem of old Earth's militaries.
  components:
    - type: Sprite
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_fatigue_green.rsi
    - type: Clothing
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_fatigue_green.rsi

- type: entity
  parent: [ClothingUniformBase, ClothingUniformFoldableBase]
  id: ClothingUniformJumpsuitUEGFatigueGrey
  name: UEG grey BDUs
  description: A common uniform worn by "grunts" in the UEG Armed Forces. Although not as common as olive BDUs, "stone gray" remains a popular choice of uniform color.
  components:
    - type: Sprite
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_fatigue_grey.rsi
    - type: Clothing
