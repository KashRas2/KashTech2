# Uniforms
- type: entity
  parent: [ClothingUniformBase]
  id: ClothingUniformJumpsuitUEGArmyService
  name: UEG army uniform
  description: A standard service uniform for enlisted men in the UEG Army. It is rarely used, as most enlisted men instead will wear their BDUs except for formal occasions.
  components:
    - type: Sprite
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_army_service.rsi
    - type: Clothing
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_army_service.rsi

- type: entity
  parent: [ClothingUniformBase]
  id: ClothingUniformJumpsuitUEGArmyServiceGeneral
  name: UEG army general uniform
  description: A standard service uniform for officers in the UEG Army. It is to be worn by generals in the field.
  components:
    - type: Sprite
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_army_service_general.rsi
    - type: Clothing
      sprite: _EE/Clothing/SolAlliance/Uniforms/SAN_army_service_general.rsi

