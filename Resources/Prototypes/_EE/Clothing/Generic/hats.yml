- type: entity
  parent: [ClothingHeadHelmetHeavyStandard]
  id: ClothingHeadHelmetHeavyHoS
  name: advanced combat helmet
  description: A heavy security helmet manufactured by Zavodskoi Interstellar and sold to NT Security. This helmet bears markings for NT Command Staff.
  components:
    - type: Sprite
      sprite: _EE/Clothing/Generic/Helmet/heavy_helmet_hos.rsi
    - type: Clothing
      sprite: _EE/Clothing/Generic/Helmet/heavy_helmet_hos.rsi
      clothingVisuals:
        head:
        - state: equipped-HELMET
        - state: equipped-HELMET-unshaded
          shader: unshaded
    - type: Reflect
      reflectProb: 0.1
      spread: 270
      reflects:
        - Energy
        - NonEnergy
