- type: entity
  id: PKAUpgradePressure
  parent: [BaseSyndicateContraband, BasePKAUpgrade]
  name: PKA modkit (pressure)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#ff4500"
    - state: overlay-2
      color: "#9b0000"
    - state: overlay-3
      color: "#ff4500"
  - type: GunUpgrade
    name: gun-upgrade-pressure-name
    uniqueGroup: pressure
  - type: GunUpgradePressure # Works almost everywhere now, yupie!
    newLowerBound: 0
    newUpperBound: 200

- type: entity
  id: PKAUpgradeSpace
  parent: BasePKAUpgrade
  name: PKA modkit (space)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#ff00bf"
    - state: overlay-2
      color: "#a0038b"
    - state: overlay-3
      color: "#ff00bf"
  - type: GunUpgrade
    name: gun-upgrade-space-name
    uniqueGroup: pressure
  - type: GunUpgradePressure
    newLowerBound: 0
    newUpperBound: 10
    newAppliedModifier: 1.5 # Basically 2 damage upgrades in 1
  - type: Tag
    tags:
    - PKAUpgrade
    - PKAUpgradeSpace

- type: entityTable
  id: ProtoKineticUpgrades
  table: !type:GroupSelector
    children:
    - id: PKAUpgradeDamage
    - id: PKAUpgradeRange
    - id: PKAUpgradeFireRate
    - id: PKAUpgradeSpace
      weight: 0.6 # Not that useful
